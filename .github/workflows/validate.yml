name: Validate Translations

on:
  pull_request:
    paths:
      - "locales/**"
  push:
    branches: [main]
    paths:
      - "locales/**"

# `contents: write` is used by the push-event README auto-commit.
# PR commenting lives in validate-comment.yml (workflow_run) so it works for fork PRs.
permissions:
  contents: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Run validation
        id: validate
        continue-on-error: true
        run: bun run validate 2>&1 | tee /tmp/validate-output.txt

      - name: Package PR comment payload
        if: github.event_name == 'pull_request'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
        run: |
          mkdir -p /tmp/pr-comment
          cp /tmp/validate-output.txt /tmp/pr-comment/validate-output.txt
          printf '%s' "$PR_NUMBER" > /tmp/pr-comment/pr-number
          printf '%s' "$VALIDATE_OUTCOME" > /tmp/pr-comment/outcome

      - name: Upload PR comment payload
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: pr-comment-payload
          path: /tmp/pr-comment/
          retention-days: 1
          if-no-files-found: error

      - name: Update README status table
        if: github.event_name == 'push' && steps.validate.outcome == 'success'
        run: bun run validate -- --update-readme

      - name: Commit README update
        if: github.event_name == 'push' && steps.validate.outcome == 'success'
        run: |
          git config user.name "owtics-bot"
          git config user.email "bot@owtics.gg"
          git add README.md
          if ! git diff --cached --quiet; then
            git commit -m "docs: update translation status [skip ci]"
            git push
          fi

      - name: Fail if validation errors
        if: steps.validate.outcome == 'failure'
        run: exit 1
